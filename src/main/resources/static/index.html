<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartKB - 企业智能知识库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .chat-container { height: calc(100vh - 140px); }
        .message { max-width: 80%; }
        .user-msg { background-color: #3b82f6; color: white; }
        .ai-msg { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50">
<div class="flex h-screen">
    <!-- 左侧：文档管理 -->
    <div class="w-80 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6 border-b">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-brain text-blue-600"></i> SmartKB
            </h1>
            <p class="text-sm text-gray-500 mt-1">企业智能知识库系统</p>
        </div>
        
        <div class="p-4">
            <button onclick="uploadDocument()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-xl flex items-center justify-center gap-2 font-medium">
                <i class="fa-solid fa-upload"></i> 上传文档
            </button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.md,.txt">
        </div>

        <div class="px-4 text-xs font-medium text-gray-500 mt-4 mb-2">已上传文档</div>
        <div id="documentList" class="flex-1 overflow-auto px-4 space-y-2 text-sm">
            <!-- JS动态填充 -->
        </div>

        <div class="p-4 border-t text-xs text-gray-500">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                Virtual Threads 已启用
            </div>
        </div>
    </div>

    <!-- 右侧：聊天区域 -->
    <div class="flex-1 flex flex-col">
        <div class="bg-white border-b px-6 py-4 flex items-center justify-between">
            <h2 class="font-semibold text-gray-700">智能对话</h2>
            <button onclick="clearChat()" 
                    class="text-gray-500 hover:text-red-600 text-sm flex items-center gap-1">
                <i class="fa-solid fa-trash"></i> 清空对话
            </button>
        </div>

        <div id="chatContainer" class="chat-container p-6 overflow-y-auto bg-gray-50 space-y-6">
            <!-- 聊天记录将在这里显示 -->
        </div>

        <div class="p-6 bg-white border-t">
            <div class="flex gap-3">
                <input type="text" id="userInput" 
                       class="flex-1 border border-gray-300 rounded-2xl px-5 py-3 focus:outline-none focus:border-blue-500"
                       placeholder="输入你的问题... (例如：请总结请假流程)"
                       onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" 
                        class="bg-blue-600 hover:bg-blue-700 text-white px-8 rounded-2xl font-medium">
                    发送
                </button>
            </div>
            <p class="text-center text-xs text-gray-400 mt-3">基于 Java 21 Virtual Threads + Spring AI 驱动</p>
        </div>
    </div>
</div>

<script>
    let chatHistory = [];

    function addMessage(content, isUser, sources = []) {
        const container = document.getElementById('chatContainer');
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message`;
        
        let html = `
            <div class="${isUser ? 'user-msg' : 'ai-msg'} px-5 py-3.5 rounded-3xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'}">
                <div class="text-sm">${content}</div>
        `;
        
        if (!isUser && sources.length > 0) {
            html += `<div class="mt-3 text-xs text-gray-500">参考来源：${sources.join('、')}</div>`;
        }
        
        html += `</div>`;
        msgDiv.innerHTML = html;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, true);
        input.value = '';

        // 调用后端接口（请根据你的Controller实际路径修改）
        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question, history: chatHistory })
            });
            
            const data = await res.json();
            addMessage(data.answer || data.content || '处理中...', false, data.sources || []);
            
            chatHistory.push({ role: 'user', content: question });
            chatHistory.push({ role: 'assistant', content: data.answer || data.content });
        } catch (e) {
            addMessage('请求失败，请检查后端是否正常运行', false);
        }
    }

    function uploadDocument() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/documents/upload', {
                method: 'POST',
                body: formData
            });
            const result = await res.json();
            alert('文档上传成功：' + file.name);
            loadDocuments();
        } catch (err) {
            alert('上传失败：' + err.message);
        }
    });

    function clearChat() {
        if (confirm('确定要清空所有对话记录吗？')) {
            document.getElementById('chatContainer').innerHTML = '';
            chatHistory = [];
        }
    }

    function loadDocuments() {
        // 可后续扩展显示已上传文档列表
        console.log('文档列表加载（可扩展）');
    }

    // 初始化欢迎语
    window.onload = function() {
        const welcome = `
            <div class="text-center text-gray-400 py-8">
                <i class="fa-solid fa-brain text-6xl mb-4 text-blue-200"></i>
                <p class="text-lg font-medium text-gray-600">欢迎使用 SmartKB 企业智能知识库</p>
                <p class="text-sm mt-2">请先上传文档，然后向我提问</p>
            </div>
        `;
        document.getElementById('chatContainer').innerHTML = welcome;
    };
</script>
</body>
</html>
