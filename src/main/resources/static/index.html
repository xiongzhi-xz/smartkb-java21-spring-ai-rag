<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartKB - 企业智能知识库</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232563eb'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='30' font-family='Arial' font-weight='700' fill='white'%3ES%3C/text%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .chat-container { min-height: 0; }
        .hidden { display: none !important; }
        .message { max-width: 80%; }
        .user-msg { background-color: #3b82f6; color: white; }
        .ai-msg { background-color: #f3f4f6; }
        .workspace-nav-button {
            align-items: center;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #4b5563;
            display: flex;
            font-size: 14px;
            gap: 10px;
            padding: 10px 12px;
            text-align: left;
            transition: background-color 120ms ease, border-color 120ms ease, color 120ms ease;
            width: 100%;
        }
        .workspace-nav-button:hover {
            background-color: #f8fafc;
            border-color: #dbeafe;
            color: #1d4ed8;
        }
        .workspace-nav-button.active {
            background-color: #eff6ff;
            border-color: #bfdbfe;
            color: #1d4ed8;
            font-weight: 600;
        }
        .workspace-nav-button i {
            width: 16px;
        }
        .workspace-tab-button {
            align-items: center;
            border-radius: 6px;
            color: #4b5563;
            display: inline-flex;
            font-size: 13px;
            font-weight: 500;
            gap: 8px;
            min-height: 34px;
            padding: 7px 12px;
            transition: background-color 120ms ease, color 120ms ease, box-shadow 120ms ease;
        }
        .workspace-tab-button:hover {
            color: #1d4ed8;
        }
        .workspace-tab-button.active {
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
            color: #1d4ed8;
        }
        @media (max-width: 768px) {
            .app-shell {
                flex-direction: column;
            }
            .app-sidebar {
                border-bottom: 1px solid #e5e7eb;
                border-right: 0;
                height: auto !important;
                max-height: 44vh;
                width: 100% !important;
            }
            .app-brand {
                padding: 12px 16px;
            }
            .app-brand h1 {
                font-size: 20px;
                line-height: 28px;
            }
            .workspace-nav {
                padding: 10px 12px;
            }
            .workspace-nav .space-y-1 {
                display: grid;
                gap: 6px;
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
            .workspace-nav .space-y-1 > :not([hidden]) ~ :not([hidden]) {
                margin-top: 0;
            }
            .workspace-nav-button {
                font-size: 12px;
                gap: 6px;
                justify-content: center;
                min-height: 42px;
                padding: 8px 6px;
            }
            .workspace-nav-button i {
                width: auto;
            }
            .document-upload {
                padding: 10px 12px;
            }
            .document-upload button {
                border-radius: 8px;
                min-height: 42px;
                padding: 8px 12px;
            }
            .document-heading,
            .document-list,
            .sidebar-status {
                display: none;
            }
            .app-main {
                min-height: 0;
                min-width: 0;
                width: 100%;
            }
            .workspace-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 10px;
                padding: 12px 14px;
            }
            .workspace-header-actions {
                gap: 8px;
                justify-content: flex-start;
                width: 100%;
            }
            #advancedDocumentFilter,
            #conversationStatus {
                max-width: 100%;
                width: 100%;
            }
            #projectIntakePanel,
            #agentTaskPanel,
            #memoryPanel,
            #evalPanel,
            #codeContextPanel,
            #chatContainer {
                padding: 14px;
            }
            #chatComposer {
                padding: 12px 14px;
            }
            .chat-composer-row {
                flex-direction: column;
                gap: 8px;
            }
            #userInput {
                border-radius: 12px;
                min-height: 44px;
                padding: 10px 14px;
            }
            #sendButton {
                min-height: 44px;
                padding-left: 16px;
                padding-right: 16px;
                width: 100%;
            }
            .message {
                max-width: 100%;
            }
        }
    </style>
</head>
<body class="overflow-hidden bg-gray-50">
<div class="app-shell flex h-screen min-w-0 overflow-hidden">
    <!-- 左侧：导航与文档管理 -->
    <div class="app-sidebar flex h-screen w-80 shrink-0 flex-col border-r border-gray-200 bg-white">
        <div class="app-brand p-6 border-b">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-brain text-blue-600"></i> SmartKB
            </h1>
            <p class="text-sm text-gray-500 mt-1">RAG + Agent 工作台</p>
        </div>

        <nav class="workspace-nav border-b p-4">
            <div class="mb-2 text-xs font-semibold uppercase text-gray-400">工作区</div>
            <div class="space-y-1">
                <button id="workspaceNavChat" type="button" onclick="openWorkspacePanel('chat')" class="workspace-nav-button active">
                    <i class="fa-solid fa-comments"></i>
                    <span>智能问答</span>
                </button>
                <button id="workspaceNavProjectIntake" type="button" onclick="openWorkspacePanel('projectIntake')" class="workspace-nav-button">
                    <i class="fa-solid fa-folder-tree"></i>
                    <span>项目接管</span>
                </button>
                <button id="workspaceNavAgentTask" type="button" onclick="openWorkspacePanel('agentTask')" class="workspace-nav-button">
                    <i class="fa-solid fa-list-check"></i>
                    <span>任务状态</span>
                </button>
                <button id="workspaceNavMemory" type="button" onclick="openWorkspacePanel('memory')" class="workspace-nav-button">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>记忆层</span>
                </button>
                <button id="workspaceNavCodeContext" type="button" onclick="openWorkspacePanel('codeContext')" class="workspace-nav-button">
                    <i class="fa-solid fa-code"></i>
                    <span>代码上下文</span>
                </button>
                <button id="workspaceNavEval" type="button" onclick="openWorkspacePanel('eval')" class="workspace-nav-button">
                    <i class="fa-solid fa-chart-simple"></i>
                    <span>Eval 评测</span>
                </button>
            </div>
        </nav>
        
        <div class="document-upload p-4">
            <button onclick="uploadDocument()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-4 rounded-lg flex items-center justify-center gap-2 font-medium">
                <i class="fa-solid fa-upload"></i> 上传文档
            </button>
            <input type="file" id="fileInput" class="hidden" accept=".pdf,.docx,.md,.txt">
        </div>

        <div class="document-heading px-4 text-xs font-medium text-gray-500 mt-4 mb-2">已上传文档</div>
        <div id="documentList" class="document-list flex-1 overflow-auto px-4 space-y-2 text-sm">
            <!-- JS动态填充 -->
        </div>

        <div class="sidebar-status p-4 border-t text-xs text-gray-500">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                Virtual Threads 已启用
            </div>
        </div>
    </div>

    <!-- 右侧：聊天区域 -->
    <div class="app-main min-h-0 min-w-0 flex-1 flex flex-col">
        <div class="workspace-header bg-white border-b px-6 py-4 flex items-center justify-between gap-4">
            <div class="min-w-0">
                <h2 id="workspaceTitle" class="font-semibold text-gray-800">智能问答</h2>
                <p id="workspaceSubtitle" class="mt-0.5 text-xs text-gray-500">Conversation / Advanced RAG</p>
            </div>
            <div class="workspace-header-actions flex items-center justify-end gap-3 flex-wrap">
                <div id="ragModeControls" class="flex items-center rounded-lg border border-gray-200 bg-gray-50 p-1 text-xs">
                    <button id="conversationModeButton" onclick="setRagMode('conversation')"
                            class="px-3 py-1.5 rounded-md flex items-center gap-1.5"
                            title="多轮对话">
                        <i class="fa-solid fa-comments"></i>
                        <span>对话</span>
                    </button>
                    <button id="advancedModeButton" onclick="setRagMode('advanced')"
                            class="px-3 py-1.5 rounded-md flex items-center gap-1.5"
                            title="Advanced RAG">
                        <i class="fa-solid fa-sliders"></i>
                        <span>Advanced</span>
                    </button>
                </div>
                <select id="advancedDocumentFilter"
                        onchange="setAdvancedFilter(this.value)"
                        class="hidden max-w-52 border border-gray-200 rounded-lg px-3 py-2 text-xs text-gray-600 focus:outline-none focus:border-blue-500">
                </select>
                <span id="conversationStatus" class="max-w-52 truncate text-xs text-gray-400"></span>
                <button id="clearChatButton" onclick="clearChat()"
                        class="text-gray-500 hover:text-red-600 text-sm flex items-center gap-1">
                    <i class="fa-solid fa-trash"></i> 新会话
                </button>
            </div>
        </div>

        <div id="projectIntakePanel" class="hidden flex-1 overflow-auto bg-gray-50 px-6 py-5">
            <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_minmax(320px,420px)]">
                <div class="space-y-3">
                    <div class="grid gap-3 md:grid-cols-[minmax(0,1fr)_minmax(220px,320px)_auto]">
                        <label class="block">
                            <span class="mb-1 block text-xs font-medium text-gray-500">项目路径</span>
                            <input id="projectIntakePath" type="text"
                                   class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                   value="/workspace/projects/smartkb-java21-spring-ai-rag"
                                   placeholder="/workspace/projects/example-project">
                        </label>
                        <label class="block">
                            <span class="mb-1 block text-xs font-medium text-gray-500">接管目标</span>
                            <input id="projectIntakeGoal" type="text"
                                   class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                   value="接管项目，判断下一步只做什么"
                                   placeholder="接管项目，判断下一步">
                        </label>
                        <div class="flex items-end">
                            <button id="projectIntakeButton" onclick="runProjectIntake()"
                                    class="h-10 min-w-28 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-blue-400 disabled:hover:bg-blue-400">
                                <i class="fa-solid fa-play mr-1.5"></i> 接管
                            </button>
                        </div>
                    </div>
                    <div id="projectIntakeResult" class="hidden rounded-lg border border-gray-200 bg-gray-50 p-4 text-sm"></div>
                </div>
                <div id="projectIntakeMeta" class="hidden rounded-lg border border-gray-200 bg-gray-50 p-4 text-sm"></div>
            </div>
        </div>

        <div id="agentTaskPanel" class="hidden flex-1 overflow-auto bg-gray-50 px-6 py-5">
            <div class="space-y-4">
                <div class="inline-flex flex-wrap rounded-lg border border-gray-200 bg-gray-100 p-1">
                    <button type="button" data-workspace-tab="agentTask" data-workspace-tab-target="agentTaskCurrentTab"
                            onclick="openWorkspaceSubTab('agentTask', 'agentTaskCurrentTab')"
                            class="workspace-tab-button active">
                        <i class="fa-solid fa-diagram-project"></i> 当前任务
                    </button>
                    <button type="button" data-workspace-tab="agentTask" data-workspace-tab-target="agentTaskCreateTab"
                            onclick="openWorkspaceSubTab('agentTask', 'agentTaskCreateTab')"
                            class="workspace-tab-button">
                        <i class="fa-solid fa-plus"></i> 新建任务
                    </button>
                    <button type="button" data-workspace-tab="agentTask" data-workspace-tab-target="agentTaskListTab"
                            onclick="openWorkspaceSubTab('agentTask', 'agentTaskListTab'); loadAgentTasks(false);"
                            class="workspace-tab-button">
                        <i class="fa-solid fa-list"></i> 任务列表
                    </button>
                </div>

                <div id="agentTaskCurrentTab" data-workspace-tab-panel="agentTask"
                     class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_minmax(320px,460px)]">
                    <div id="agentTaskResult" class="rounded-lg border border-gray-200 bg-gray-50 p-4 text-sm"></div>
                    <div class="space-y-3 rounded-lg border border-gray-200 bg-gray-50 p-4">
                        <h3 class="text-xs font-semibold uppercase text-gray-500">状态流转</h3>
                        <div class="grid gap-3 md:grid-cols-2 xl:grid-cols-1">
                            <label class="block">
                                <span class="mb-1 block text-xs font-medium text-gray-500">备注</span>
                                <input id="agentTaskNote" type="text"
                                       class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                       placeholder="当前状态变化说明">
                            </label>
                            <label class="block">
                                <span class="mb-1 block text-xs font-medium text-gray-500">计划</span>
                                <input id="agentTaskPlan" type="text"
                                       class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                       placeholder="文件范围、风险、验证方式">
                            </label>
                            <label class="block">
                                <span class="mb-1 block text-xs font-medium text-gray-500">验证</span>
                                <input id="agentTaskVerification" type="text"
                                       class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                       placeholder="测试、lint、接口或手动验证">
                            </label>
                            <label class="block">
                                <span class="mb-1 block text-xs font-medium text-gray-500">结果</span>
                                <input id="agentTaskResultSummary" type="text"
                                       class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                       placeholder="记录结果或失败原因">
                            </label>
                        </div>
                        <div class="flex flex-wrap items-center justify-between gap-3 rounded-lg border border-gray-200 bg-white p-3">
                            <label class="flex items-center gap-2 text-sm text-gray-600">
                                <input id="agentTaskVerificationPassed" type="checkbox"
                                       class="h-4 w-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                验证通过后允许进入 RECORD
                            </label>
                            <div id="agentTaskControls" class="flex flex-wrap justify-end gap-2 text-sm"></div>
                        </div>
                    </div>
                </div>

                <div id="agentTaskCreateTab" data-workspace-tab-panel="agentTask"
                     class="hidden space-y-3 rounded-lg border border-gray-200 bg-gray-50 p-4">
                    <div class="grid gap-3 md:grid-cols-[minmax(160px,220px)_minmax(0,1fr)_minmax(180px,240px)_auto]">
                        <label class="block">
                            <span class="mb-1 block text-xs font-medium text-gray-500">项目 ID</span>
                            <input id="agentTaskProjectId" type="text"
                                   class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                   value="ticket-project"
                                   placeholder="ticket-project">
                        </label>
                        <label class="block">
                            <span class="mb-1 block text-xs font-medium text-gray-500">任务标题</span>
                            <input id="agentTaskTitle" type="text"
                                   class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                   value="运行首个本地验证任务"
                                   placeholder="运行首个本地验证任务">
                        </label>
                        <label class="block">
                            <span class="mb-1 block text-xs font-medium text-gray-500">风险等级</span>
                            <select id="agentTaskRiskLevel"
                                    class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none">
                                <option value="low">low</option>
                                <option value="medium">medium</option>
                                <option value="high">high</option>
                            </select>
                        </label>
                        <div class="flex items-end">
                            <button id="agentTaskCreateButton" onclick="createAgentTask()"
                                    class="h-10 min-w-24 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-blue-400 disabled:hover:bg-blue-400">
                                <i class="fa-solid fa-plus mr-1.5"></i> 创建
                            </button>
                        </div>
                    </div>
                    <label class="block">
                        <span class="mb-1 block text-xs font-medium text-gray-500">目标</span>
                        <input id="agentTaskGoal" type="text"
                               class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                               value="完成一次可复现验证并记录结果"
                               placeholder="完成一次可复现验证并记录结果">
                    </label>
                    <div id="agentTaskCreateResult" class="hidden rounded-lg border border-gray-200 bg-white p-3 text-sm"></div>
                </div>

                <div id="agentTaskListTab" data-workspace-tab-panel="agentTask"
                     class="hidden space-y-3 rounded-lg border border-gray-200 bg-gray-50 p-4">
                    <div class="flex items-center justify-between gap-3">
                        <h3 class="text-xs font-semibold uppercase text-gray-500">任务列表</h3>
                        <button onclick="loadAgentTasks(false)"
                                class="h-9 w-9 rounded-lg border border-gray-200 bg-white text-gray-500 hover:border-blue-300 hover:text-blue-700"
                                title="刷新任务">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                    </div>
                    <div id="agentTaskList" class="text-sm"></div>
                </div>
            </div>
        </div>

        <div id="memoryPanel" class="hidden flex-1 overflow-auto bg-gray-50 px-6 py-5">
            <div class="space-y-4">
                <div class="grid gap-3 rounded-lg border border-gray-200 bg-gray-50 p-4 md:grid-cols-[minmax(160px,220px)_minmax(0,1fr)_auto]">
                    <label class="block">
                        <span class="mb-1 block text-xs font-medium text-gray-500">项目 ID</span>
                        <input id="memoryProjectId" type="text"
                               class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                               value="ticket-project"
                               placeholder="ticket-project">
                    </label>
                    <label class="block">
                        <span class="mb-1 block text-xs font-medium text-gray-500">项目路径</span>
                        <input id="memoryRootPath" type="text"
                               class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                               value="/workspace/projects/smartkb-java21-spring-ai-rag"
                               placeholder="/workspace/projects/example-project">
                    </label>
                    <div class="flex items-end gap-2">
                        <button id="memoryRefreshButton" onclick="loadMemoryRecords()"
                                class="h-10 w-10 rounded-lg border border-gray-200 bg-white text-gray-500 hover:border-blue-300 hover:text-blue-700"
                                title="刷新记忆">
                            <i class="fa-solid fa-rotate"></i>
                        </button>
                        <button id="memoryImportButton" onclick="importHighAuthorityMemory()"
                                class="h-10 min-w-32 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-blue-400 disabled:hover:bg-blue-400">
                            <i class="fa-solid fa-file-import mr-1.5"></i> 导入高权威
                        </button>
                    </div>
                </div>

                <div class="grid gap-4 xl:grid-cols-[minmax(0,1fr)_minmax(340px,460px)]">
                    <div class="space-y-4">
                        <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                            <h3 class="mb-3 text-xs font-semibold uppercase text-gray-500">新增记忆</h3>
                            <div class="grid gap-3 md:grid-cols-3">
                                <label class="block">
                                    <span class="mb-1 block text-xs font-medium text-gray-500">权威级别</span>
                                    <select id="memoryAuthorityLevel"
                                            class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none">
                                        <option value="HIGH">HIGH</option>
                                        <option value="MEDIUM">MEDIUM</option>
                                        <option value="LOW">LOW</option>
                                    </select>
                                </label>
                                <label class="block">
                                    <span class="mb-1 block text-xs font-medium text-gray-500">来源类型</span>
                                    <input id="memorySourceType" type="text"
                                           class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                           value="manual-note"
                                           placeholder="SPEC / HANDOFF / manual-note">
                                </label>
                                <label class="block">
                                    <span class="mb-1 block text-xs font-medium text-gray-500">标签</span>
                                    <input id="memoryTags" type="text"
                                           class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                           value="agent,project"
                                           placeholder="agent,project">
                                </label>
                            </div>
                            <label class="mt-3 block">
                                <span class="mb-1 block text-xs font-medium text-gray-500">来源路径</span>
                                <input id="memorySourcePath" type="text"
                                       class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                       value="manual"
                                       placeholder="SPEC.md / HANDOFF.md / manual">
                            </label>
                            <label class="mt-3 block">
                                <span class="mb-1 block text-xs font-medium text-gray-500">内容</span>
                                <textarea id="memoryContent" rows="4"
                                          class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm text-gray-700 focus:border-blue-500 focus:outline-none"
                                          placeholder="记录一条可复用的项目事实、决策或验证结果"></textarea>
                            </label>
                            <div class="mt-3 flex justify-end">
                                <button id="memoryCreateButton" onclick="createMemoryRecord()"
                                        class="h-10 min-w-28 rounded-lg bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-700 disabled:bg-blue-400 disabled:hover:bg-blue-400">
                                    <i class="fa-solid fa-plus mr-1.5"></i> 新增
                                </button>
                            </div>
                        </div>

                        <div class="rounded-lg border border-gray-200 bg-gray-50 p-4">
                            <h3 class="mb-3 text-xs font-semibold uppercase text-gray-500">冲突检查</h3>
                            <div class="grid gap-3 md:grid-cols-[160px_minmax(0,1fr)]">
                                <label class="block">

<script>
    let chatHistory = [];
    const conversationIdKey = 'smartkb.conversationId';
    const ragModeKey = 'smartkb.ragMode';
    const advancedFilterKey = 'smartkb.advancedFilterFileName';
    let conversationId = localStorage.getItem(conversationIdKey) || null;
    let ragMode = localStorage.getItem(ragModeKey) || 'conversation';
    let advancedFilterFileName = localStorage.getItem(advancedFilterKey) || '';
    let uploadedDocuments = [];
    let selectedDocumentFileName = null;
    let chatBusy = false;
    let projectIntakeBusy = false;
    let agentTaskBusy = false;
    let memoryBusy = false;
    let evalCaseBusy = false;
    let codeContextBusy = false;
    let activeAgentTask = null;
    const documentDetailWidthKey = 'smartkb.documentDetailWidth';
    const documentDetailMinWidth = 420;
    const documentDetailMaxWidth = 900;
    const workspaceConfig = {
        chat: {
            navId: 'workspaceNavChat',
            title: '智能问答',
            subtitle: 'Conversation / Advanced RAG'
        },
        projectIntake: {
            navId: 'workspaceNavProjectIntake',
            panelId: 'projectIntakePanel',
            title: '项目接管',
            subtitle: '接管摘要'
        },
        agentTask: {
            navId: 'workspaceNavAgentTask',
            panelId: 'agentTaskPanel',
            title: '任务状态',
            subtitle: '状态流转'
        },
        memory: {
            navId: 'workspaceNavMemory',
            panelId: 'memoryPanel',
            title: '记忆层',
            subtitle: '高权威记忆 / 冲突检查'
        },
        codeContext: {
            navId: 'workspaceNavCodeContext',
            panelId: 'codeContextPanel',
            title: '代码上下文',
            subtitle: '文件树 / 搜索 / Diff'
        },
        eval: {
            navId: 'workspaceNavEval',
            panelId: 'evalPanel',
            title: 'Eval 评测',
            subtitle: '记录 / 报告'
        }
    };

    function setElementHidden(id, isHidden) {
        const element = document.getElementById(id);
        if (element) {
            element.classList.toggle('hidden', isHidden);
        }
    }

    function openWorkspaceSubTab(scope, targetId) {
        document.querySelectorAll(`[data-workspace-tab="${scope}"]`).forEach(button => {
            button.classList.toggle('active', button.dataset.workspaceTabTarget === targetId);
        });
        document.querySelectorAll(`[data-workspace-tab-panel="${scope}"]`).forEach(panel => {
            panel.classList.toggle('hidden', panel.id !== targetId);
            if (panel.id === targetId) {
                panel.scrollTop = 0;
            }
        });
    }

    function openWorkspacePanel(name) {
        const config = workspaceConfig[name] || workspaceConfig.chat;
        const isChat = name === 'chat';

        document.getElementById('workspaceTitle').textContent = config.title;
        document.getElementById('workspaceSubtitle').textContent = config.subtitle;

        Object.entries(workspaceConfig).forEach(([key, item]) => {
            const nav = document.getElementById(item.navId);
            if (nav) {
                nav.classList.toggle('active', key === name);
            }
            if (item.panelId) {
                setElementHidden(item.panelId, true);
            }
        });

        setElementHidden('chatContainer', !isChat);
        setElementHidden('chatComposer', !isChat);
        setElementHidden('ragModeControls', !isChat);
        setElementHidden('conversationStatus', !isChat);
        setElementHidden('clearChatButton', !isChat);

        if (isChat) {
            updateRagModeUI();
            return;
        }

        setElementHidden('advancedDocumentFilter', true);
        setElementHidden(config.panelId, false);

        if (config.panelId) {
            const panel = document.getElementById(config.panelId);
            if (panel) {
                panel.scrollTop = 0;
            }
        }

        if (name === 'agentTask') {
            renderAgentTask(activeAgentTask);
            loadAgentTasks();
        } else if (name === 'memory') {
            loadMemoryRecords();
        } else if (name === 'eval') {
            loadEvalData();
        }
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"']/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[char]));
    }

    function renderText(value) {
        return escapeHtml(value).replace(/\n/g, '<br>');
    }

    function renderProjectIntakeList(items, emptyText = '暂无') {
        if (!Array.isArray(items) || items.length === 0) {
            return `<p class="text-gray-400">${escapeHtml(emptyText)}</p>`;
        }

        return `
            <ul class="space-y-1.5">
                ${items.map(item => `
                    <li class="flex gap-2 text-gray-700">
                        <i class="fa-solid fa-angle-right mt-1 text-[10px] text-gray-400"></i>
                        <span>${renderText(item)}</span>
                    </li>
                `).join('')}
            </ul>
        `;
    }

    function renderProjectIntakeValue(value, emptyText = '未识别') {
        if (value === null || value === undefined || String(value).trim() === '') {
            return `<span class="text-gray-400">${escapeHtml(emptyText)}</span>`;
        }
        return renderText(value);
    }

    function renderProjectIntakeSection(title, bodyHtml) {
        return `
            <section class="rounded-lg border border-gray-200 bg-white p-3">
                <h4 class="mb-2 flex items-center gap-2 text-xs font-semibold uppercase text-gray-500">
                    <i class="fa-solid fa-circle text-[6px] text-blue-500"></i>${escapeHtml(title)}
                </h4>
                <div class="text-sm leading-6 text-gray-700">${bodyHtml}</div>
            </section>
        `;
    }

    function renderCompactMetric(label, value, tone = 'gray') {
        const tones = {
            blue: 'border-blue-200 bg-blue-50 text-blue-700',
            green: 'border-emerald-200 bg-emerald-50 text-emerald-700',
            amber: 'border-amber-200 bg-amber-50 text-amber-700',
            red: 'border-red-200 bg-red-50 text-red-700',
            gray: 'border-gray-200 bg-white text-gray-700'
        };
        return `
            <div class="rounded-lg border ${tones[tone] || tones.gray} px-3 py-2">
                <p class="text-[11px] font-medium uppercase tracking-wide opacity-70">${escapeHtml(label)}</p>
                <p class="mt-1 text-lg font-semibold leading-none">${escapeHtml(value)}</p>
            </div>
        `;
    }

    function toggleProjectIntakePanel() {
        openWorkspacePanel('projectIntake');
    }

    function setProjectIntakeLoading(isLoading) {
        projectIntakeBusy = isLoading;
        const button = document.getElementById('projectIntakeButton');
        button.disabled = isLoading;
        button.innerHTML = isLoading
            ? '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> 接管中'
            : '<i class="fa-solid fa-play mr-1.5"></i> 接管';
    }

    function renderProjectIntakeResult(data) {
        const result = document.getElementById('projectIntakeResult');
        const meta = document.getElementById('projectIntakeMeta');
        const project = data.project || {};
        const intake = data.intake || {};
        const workingTree = intake.workingTree || {};
        const commits = Array.isArray(workingTree.latestCommits) ? workingTree.latestCommits : [];
        const statusText = workingTree.isGitRepository === false
            ? '不是 Git 仓库'
            : workingTree.hasUncommittedChanges ? '有未提交改动' : '工作区干净';
        const detectedStack = Array.isArray(project.detectedStack) ? project.detectedStack : [];
        const runnableCommands = Array.isArray(intake.runnableCommands) ? intake.runnableCommands : [];
        const verificationGaps = Array.isArray(intake.verificationGaps) ? intake.verificationGaps : [];
        const evidenceItems = Array.isArray(data.evidence) ? data.evidence : [];
        const readLog = data.readLog || {};
        const readFiles = Array.isArray(readLog.readFiles) ? readLog.readFiles : [];
        const commands = Array.isArray(readLog.commands) ? readLog.commands : [];
        const warnings = Array.isArray(data.warnings) ? data.warnings : [];

        result.classList.remove('hidden');
        meta.classList.remove('hidden');
        result.innerHTML = `
            <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
                <div>
                    <h3 class="font-semibold text-gray-800">${renderProjectIntakeValue(project.name, '未命名项目')}</h3>
                    <p class="mt-0.5 break-all text-xs text-gray-500">${renderProjectIntakeValue(project.rootPath, '无路径')}</p>
                </div>
                <span class="rounded-full border border-blue-200 bg-blue-50 px-2.5 py-1 text-xs font-medium text-blue-700">
                    ${escapeHtml(statusText)}
                </span>
            </div>
            <div class="mb-3 grid gap-2 sm:grid-cols-2 xl:grid-cols-4">
                ${renderCompactMetric('技术栈', detectedStack.length, detectedStack.length > 0 ? 'blue' : 'gray')}
                ${renderCompactMetric('可运行命令', runnableCommands.length, runnableCommands.length > 0 ? 'green' : 'gray')}
                ${renderCompactMetric('验证缺口', verificationGaps.length, verificationGaps.length > 0 ? 'amber' : 'green')}
                ${renderCompactMetric('警告', warnings.length, warnings.length > 0 ? 'red' : 'green')}
            </div>
            <div class="grid gap-3 lg:grid-cols-2">

    async function runProjectIntake() {
        if (projectIntakeBusy) return;

        const rootPathInput = document.getElementById('projectIntakePath');
        const goalInput = document.getElementById('projectIntakeGoal');
        const rootPath = rootPathInput.value.trim();
        const goal = goalInput.value.trim();
        const result = document.getElementById('projectIntakeResult');
        const meta = document.getElementById('projectIntakeMeta');

        if (!rootPath) {
            rootPathInput.focus();
            result.classList.remove('hidden');
            result.innerHTML = '<p class="text-sm text-red-600">请先输入项目路径。</p>';
            return;
        }

        setProjectIntakeLoading(true);
        result.classList.remove('hidden');
        meta.classList.add('hidden');
        result.innerHTML = `
            <div class="flex items-center gap-2 text-sm text-gray-600">
                <i class="fa-solid fa-spinner fa-spin text-blue-600"></i>
                正在读取项目文档、Git 状态和最近提交...
            </div>
        `;

        try {
            const res = await fetch('/api/agent/projects/intake', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    rootPath,
                    goal,
                    includeCodeTree: true,
                    maxFiles: 200,
                    maxFileBytes: 65536
                })
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data.success === false) {
                throw new Error(data.error || data.message || `项目接管失败（HTTP ${res.status}）`);
            }
            renderProjectIntakeResult(data);
        } catch (e) {
            result.classList.remove('hidden');
            result.innerHTML = `
                <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                    <i class="fa-solid fa-triangle-exclamation mr-1.5"></i>${renderProjectIntakeValue(e.message, '项目接管失败')}
                </div>
            `;
        } finally {
            setProjectIntakeLoading(false);
        }
    }

    function toggleAgentTaskPanel() {
        openWorkspacePanel('agentTask');

    function setAgentTaskLoading(isLoading) {
        agentTaskBusy = isLoading;
        const createButton = document.getElementById('agentTaskCreateButton');
        createButton.disabled = isLoading;
        createButton.innerHTML = isLoading
            ? '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> 处理中'
            : '<i class="fa-solid fa-plus mr-1.5"></i> 创建';
        document.querySelectorAll('[data-agent-task-transition]').forEach(button => {
            button.disabled = isLoading;
            button.classList.toggle('opacity-70', isLoading);
            button.classList.toggle('cursor-not-allowed', isLoading);

    function getNextAgentTaskStatus(status) {
        return {
            INTAKE: 'PLAN',
            PLAN: 'EXECUTE',
            EXECUTE: 'VERIFY',
            VERIFY: 'RECORD'
        }[status] || '';
    }

    function isAgentTaskTerminal(status) {
        return ['RECORD', 'BLOCKED', 'FAILED'].includes(status);
    }

    function getAgentTaskStatusClass(status) {
        const classes = {
            INTAKE: 'border-sky-200 bg-sky-50 text-sky-700',
            PLAN: 'border-blue-200 bg-blue-50 text-blue-700',
            EXECUTE: 'border-amber-200 bg-amber-50 text-amber-700',
            VERIFY: 'border-indigo-200 bg-indigo-50 text-indigo-700',
            RECORD: 'border-emerald-200 bg-emerald-50 text-emerald-700',
            BLOCKED: 'border-orange-200 bg-orange-50 text-orange-700',
            FAILED: 'border-red-200 bg-red-50 text-red-700'
        };
        return classes[status] || 'border-gray-200 bg-gray-50 text-gray-600';
    }

    function renderAgentTaskStatusBadge(status) {
        return `
            <span class="rounded-full border px-2.5 py-1 text-xs font-medium ${getAgentTaskStatusClass(status)}">
                ${escapeHtml(status || 'NONE')}
            </span>
        `;
    }

    function renderAgentTask(task) {
        const result = document.getElementById('agentTaskResult');
        const controls = document.getElementById('agentTaskControls');

        if (!task) {
            result.innerHTML = `
                <div class="text-gray-500">
                    <p class="font-medium text-gray-700">暂无当前任务</p>
                    <p class="mt-1 text-xs">创建任务后会从 INTAKE 开始，并按固定状态流转。</p>
                </div>
            `;
            controls.innerHTML = '';
            return;
        }

        activeAgentTask = task;
        const events = Array.isArray(task.events) ? task.events : [];
        result.innerHTML = `
            <div class="mb-3 flex items-start justify-between gap-3">
                <div class="min-w-0">
                    <h3 class="truncate font-semibold text-gray-800">${renderProjectIntakeValue(task.title, '未命名任务')}</h3>
                    <p class="mt-0.5 break-all text-xs text-gray-500">${renderProjectIntakeValue(task.id, '无 ID')}</p>
                </div>
                ${renderAgentTaskStatusBadge(task.status)}
            </div>
            <div class="space-y-3">
                ${renderProjectIntakeSection('目标', renderProjectIntakeValue(task.goal))}
                ${renderProjectIntakeSection('计划', renderProjectIntakeValue(task.plan, '未记录'))}
                ${renderProjectIntakeSection('验证', renderProjectIntakeValue(task.verification, '未记录'))}
                ${renderProjectIntakeSection('结果', renderProjectIntakeValue(task.resultSummary, '未记录'))}
                <section class="rounded-lg border border-gray-200 bg-white p-3">

                    <div class="space-y-2">
                        ${events.map(event => `
                            <div class="rounded-md border border-gray-100 bg-gray-50 p-2">
                                <div class="flex items-center justify-between gap-2">
                                    ${renderAgentTaskStatusBadge(event.status)}
                                    <span class="text-[11px] text-gray-400">${renderProjectIntakeValue(event.createdAt, '')}</span>
                                </div>
                                <p class="mt-1 text-xs text-gray-600">${renderProjectIntakeValue(event.note, '无备注')}</p>

                    </div>
                </section>
            </div>

        renderAgentTaskControls(task.status);

    function renderAgentTaskControls(status) {
        const controls = document.getElementById('agentTaskControls');
        if (!activeAgentTask || isAgentTaskTerminal(status)) {
            controls.innerHTML = '<span class="text-xs text-gray-400">当前任务已结束</span>';
            return;
        }

        const nextStatus = getNextAgentTaskStatus(status);
        const nextButton = nextStatus ? `
            <button data-agent-task-transition="${escapeHtml(nextStatus)}"
                    onclick="transitionAgentTask('${escapeHtml(nextStatus)}')"

                <i class="fa-solid fa-arrow-right mr-1.5"></i>${escapeHtml(nextStatus)}

                    onclick="transitionAgentTask('BLOCKED')"
                    class="rounded-lg border border-orange-200 bg-white px-3 py-2 text-orange-700 hover:bg-orange-50">
                <i class="fa-solid fa-pause mr-1.5"></i>BLOCKED
            </button>
            <button data-agent-task-transition="FAILED"
                    onclick="transitionAgentTask('FAILED')"

    async function createAgentTask() {
        if (agentTaskBusy) return;

        const titleInput = document.getElementById('agentTaskTitle');
        const title = titleInput.value.trim();
        const goal = document.getElementById('agentTaskGoal').value.trim();
        const createResult = document.getElementById('agentTaskCreateResult');
        createResult.classList.add('hidden');
        createResult.innerHTML = '';

        if (!title || !goal) {
            createResult.classList.remove('hidden');
            createResult.innerHTML = '<p class="text-sm text-red-600">请填写任务标题和目标。</p>';
            (!title ? titleInput : document.getElementById('agentTaskGoal')).focus();
            return;
        }

        setAgentTaskLoading(true);
        try {
            const task = await requestAgentTask('/api/agent/tasks', {
                method: 'POST',
                body: {
                    projectId: document.getElementById('agentTaskProjectId').value.trim(),
                    title,
                    goal,
                    riskLevel: document.getElementById('agentTaskRiskLevel').value
                }
            });
            createResult.classList.add('hidden');
            createResult.innerHTML = '';
            renderAgentTask(task);
            openWorkspaceSubTab('agentTask', 'agentTaskCurrentTab');
            await loadAgentTasks(false);
        } catch (e) {
            createResult.classList.remove('hidden');
            createResult.innerHTML = `
                <div class="rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                    <i class="fa-solid fa-triangle-exclamation mr-1.5"></i>${renderProjectIntakeValue(e.message, '任务创建失败')}
                </div>
            `;
        } finally {
            setAgentTaskLoading(false);
        }
    }

    async function transitionAgentTask(targetStatus) {
        if (agentTaskBusy || !activeAgentTask) return;

        setAgentTaskLoading(true);
        try {
            const task = await requestAgentTask(`/api/agent/tasks/${encodeURIComponent(activeAgentTask.id)}/transition`, {
                method: 'POST',
                body: {
                    targetStatus,
                    note: document.getElementById('agentTaskNote').value.trim(),
                    plan: document.getElementById('agentTaskPlan').value.trim(),
                    verification: document.getElementById('agentTaskVerification').value.trim(),
                    resultSummary: document.getElementById('agentTaskResultSummary').value.trim(),
                    verificationPassed: document.getElementById('agentTaskVerificationPassed').checked
                }
            });
            renderAgentTask(task);
            await loadAgentTasks(false);
        } catch (e) {
            const result = document.getElementById('agentTaskResult');
            result.innerHTML += `
                <div class="mt-3 rounded-lg border border-red-200 bg-red-50 p-3 text-sm text-red-700">
                    <i class="fa-solid fa-triangle-exclamation mr-1.5"></i>${renderProjectIntakeValue(e.message, '状态流转失败')}
                </div>
            `;
        } finally {
            setAgentTaskLoading(false);
        }
    }

    async function loadAgentTasks(renderFirst = true) {
        try {
            const tasks = await requestAgentTask('/api/agent/tasks');
            renderAgentTaskList(tasks);
            if (renderFirst && Array.isArray(tasks) && tasks.length > 0 && !activeAgentTask) {
                renderAgentTask(tasks[0]);
            }
        } catch (e) {
            document.getElementById('agentTaskList').innerHTML = `
                <p class="text-sm text-red-600">${renderProjectIntakeValue(e.message, '任务列表加载失败')}</p>
            `;
        }
    }

    async function selectAgentTask(id) {
        try {
            const task = await requestAgentTask(`/api/agent/tasks/${encodeURIComponent(id)}`);
            renderAgentTask(task);
            openWorkspaceSubTab('agentTask', 'agentTaskCurrentTab');
        } catch (e) {
            document.getElementById('agentTaskResult').innerHTML = `
                <p class="text-sm text-red-600">${renderProjectIntakeValue(e.message, '任务加载失败')}</p>
            `;
        }
    }

        if (options.body) {
            fetchOptions.body = JSON.stringify(options.body);

        const res = await fetch(url, fetchOptions);

        if (!res.ok || data.success === false) {
            throw new Error(data.error || data.message || `任务请求失败（HTTP ${res.status}）`);

    function setMemoryLoading(isLoading) {

        ['memoryCreateButton', 'memoryImportButton', 'memoryConflictButton', 'memoryRefreshButton']
            .forEach(id => {
                const button = document.getElementById(id);
                if (button) {
                    button.disabled = isLoading;

                }

    function readMemoryTags(id) {
        return document.getElementById(id).value
            .split(',')
            .map(item => item.trim())
            .filter(Boolean);
    }

    function getMemoryAuthorityClass(level) {
        const classes = {
            HIGH: 'border-red-200 bg-red-50 text-red-700',
            MEDIUM: 'border-amber-200 bg-amber-50 text-amber-700',
            LOW: 'border-slate-200 bg-slate-50 text-slate-700'
        };
        return classes[level] || 'border-gray-200 bg-gray-50 text-gray-600';
    }

    function renderMemoryAuthorityBadge(level) {
        return `
            <span class="rounded-full border px-2.5 py-1 text-xs font-medium ${getMemoryAuthorityClass(level)}">
                ${escapeHtml(level || 'LOW')}
            </span>
        `;
    }

    function renderMemoryTags(tags) {
        if (!Array.isArray(tags) || tags.length === 0) {
            return '<span class="text-gray-400">无标签</span>';
        }
        return tags.map(tag => `
            <span class="rounded-full border border-gray-200 bg-white px-2 py-0.5 text-[11px] text-gray-600">
                ${escapeHtml(tag)}
            </span>
        `).join('');
    }

    function getUniqueMemoryValues(records, key) {
        return new Set((Array.isArray(records) ? records : [])
            .map(record => String(record[key] || '').trim())
            .filter(Boolean));
    }

    function getUniqueMemoryTags(records) {
        return new Set((Array.isArray(records) ? records : [])
            .flatMap(record => Array.isArray(record.tags) ? record.tags : [])
            .map(tag => String(tag || '').trim())
            .filter(Boolean));
    }

    function renderMemorySummary(records) {
        const highAuthorityCount = records.filter(memory => String(memory.authorityLevel || '').toUpperCase() === 'HIGH').length;
        const sourceTypeCount = getUniqueMemoryValues(records, 'sourceType').size;
        const tagCount = getUniqueMemoryTags(records).size;
        return `
            <div class="mb-3 grid gap-2 sm:grid-cols-2 xl:grid-cols-4">
                ${renderCompactMetric('记忆', records.length, records.length > 0 ? 'blue' : 'gray')}
                ${renderCompactMetric('高权威', highAuthorityCount, highAuthorityCount > 0 ? 'green' : 'gray')}
                ${renderCompactMetric('来源类型', sourceTypeCount, sourceTypeCount > 0 ? 'amber' : 'gray')}
                ${renderCompactMetric('标签', tagCount, tagCount > 0 ? 'blue' : 'gray')}
            </div>
        `;
    }

    function renderMemoryRecords(records) {
        const target = document.getElementById('memoryList');
        if (!Array.isArray(records) || records.length === 0) {
            target.innerHTML = `
                <h3 class="mb-2 text-xs font-semibold uppercase text-gray-500">记忆列表</h3>
                <p class="text-gray-400">暂无记忆。可以先导入 SPEC/HANDOFF 或手工新增一条。</p>
            `;
            return;
        }

        target.innerHTML = `
            <div class="mb-3 flex items-center justify-between gap-2">
                <h3 class="text-xs font-semibold uppercase text-gray-500">记忆列表</h3>
                <span class="text-xs text-gray-400">${records.length} 条</span>
            </div>
            ${renderMemorySummary(records)}
            <div class="max-h-[34rem] space-y-2 overflow-auto">
                ${records.map(memory => `
                    <div class="rounded-md border border-gray-200 bg-white p-3">
                        <div class="flex items-start justify-between gap-2">
                            <div class="min-w-0">
                                <p class="break-all text-xs font-medium text-gray-700">${renderProjectIntakeValue(memory.sourcePath, '无来源')}</p>
                                <p class="mt-0.5 text-[11px] text-gray-400">${renderProjectIntakeValue(memory.sourceType, 'unknown')}</p>
                            </div>
                            ${renderMemoryAuthorityBadge(memory.authorityLevel)}
                        </div>
                        <p class="mt-2 line-clamp-4 text-xs leading-5 text-gray-600">${renderText(memory.content || '')}</p>
                        <div class="mt-2 flex flex-wrap gap-1.5">${renderMemoryTags(memory.tags)}</div>
                    </div>
                `).join('')}

    function renderMemoryAction(message, type = 'blue') {
        const result = document.getElementById('memoryActionResult');
        const color = type === 'red'
            ? 'border-red-200 bg-red-50 text-red-700'
            : type === 'emerald'
                ? 'border-emerald-200 bg-emerald-50 text-emerald-700'
                : 'border-blue-200 bg-blue-50 text-blue-700';

        result.className = `rounded-lg border p-4 text-sm ${color}`;

    async function requestMemory(url, options = {}) {
        const fetchOptions = {
            method: options.method || 'GET',
            headers: { 'Content-Type': 'application/json' }
        };
        if (options.body) {
            fetchOptions.body = JSON.stringify(options.body);
        }
        const res = await fetch(url, fetchOptions);
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
            throw new Error(data.error || data.message || `记忆请求失败（HTTP ${res.status}）`);

    async function loadMemoryRecords() {
        const projectId = document.getElementById('memoryProjectId').value.trim();
        const suffix = projectId ? `?projectId=${encodeURIComponent(projectId)}` : '';
        try {
            const records = await requestMemory(`/api/agent/memories${suffix}`);
            renderMemoryRecords(records);

            document.getElementById('memoryList').innerHTML = `
                <p class="text-sm text-red-600">${renderProjectIntakeValue(e.message, '记忆列表加载失败')}</p>
            `;
        }

    async function createMemoryRecord() {
        if (memoryBusy) return;

        const projectId = document.getElementById('memoryProjectId').value.trim();
        const contentInput = document.getElementById('memoryContent');
        const content = contentInput.value.trim();
        if (!projectId || !content) {
            renderMemoryAction('请填写项目 ID 和记忆内容。', 'red');
            (!projectId ? document.getElementById('memoryProjectId') : contentInput).focus();
            return;
        }

        setMemoryLoading(true);
        try {
            const memory = await requestMemory('/api/agent/memories', {
                method: 'POST',
                body: {
                    projectId,
                    authorityLevel: document.getElementById('memoryAuthorityLevel').value,
                    sourceType: document.getElementById('memorySourceType').value.trim(),
                    sourcePath: document.getElementById('memorySourcePath').value.trim(),
                    content,
                    tags: readMemoryTags('memoryTags')
                }
            });
            renderMemoryAction(`<i class="fa-solid fa-circle-check mr-1.5"></i>已新增记忆 ${renderText(memory.id)}`, 'emerald');
            contentInput.value = '';
            await loadMemoryRecords();
        } catch (e) {
            renderMemoryAction(`<i class="fa-solid fa-triangle-exclamation mr-1.5"></i>${renderProjectIntakeValue(e.message, '记忆保存失败')}`, 'red');
        } finally {
            setMemoryLoading(false);
        }
    }

    async function importHighAuthorityMemory() {
        if (memoryBusy) return;

        const projectId = document.getElementById('memoryProjectId').value.trim();
        const rootPath = document.getElementById('memoryRootPath').value.trim();
        if (!projectId || !rootPath) {
            renderMemoryAction('请填写项目 ID 和项目路径。', 'red');
            (!projectId ? document.getElementById('memoryProjectId') : document.getElementById('memoryRootPath')).focus();
            return;
        }

        setMemoryLoading(true);
        try {
            const response = await requestMemory('/api/agent/memories/import/high-authority', {
                method: 'POST',
                body: { projectId, rootPath, maxFileBytes: 65536 }
            });
            const imported = Array.isArray(response.imported) ? response.imported.length : 0;
            const skipped = Array.isArray(response.skipped) ? response.skipped.length : 0;
            renderMemoryAction(`<i class="fa-solid fa-file-import mr-1.5"></i>已导入 ${imported} 条高权威记忆，跳过 ${skipped} 个文件。`, 'blue');
            await loadMemoryRecords();
        } catch (e) {

    function readEvalLines(id) {
        return document.getElementById(id).value
            .split(/\r?\n/)
            .map(item => item.trim())
            .filter(Boolean);
    }

    function readEvalNumber(id) {
        const value = document.getElementById(id).value.trim();
        if (!value) {
            return null;
        }
        const number = Number(value);
        return Number.isFinite(number) ? number : null;
    }

    function formatEvalNumber(value, suffix = '') {
        if (value === null || value === undefined || value === '') {
            return '<span class="text-gray-400">n/a</span>';
        }
        return `${escapeHtml(value)}${suffix}`;
    }

    function formatEvalPercent(value) {
        if (value === null || value === undefined) {
            return '<span class="text-gray-400">n/a</span>';
        }
        return `${Math.round(Number(value) * 1000) / 10}%`;
    }

    function getEvalStatusClass(status) {
        const classes = {
            PASSED: 'border-emerald-200 bg-emerald-50 text-emerald-700',
            PARTIAL: 'border-amber-200 bg-amber-50 text-amber-700',
            FAILED: 'border-red-200 bg-red-50 text-red-700'
        };
        return classes[status] || 'border-gray-200 bg-gray-50 text-gray-600';
    }

    function renderEvalStatusBadge(status) {
        return `
            <span class="rounded-full border px-2.5 py-1 text-xs font-medium ${getEvalStatusClass(status)}">
                ${escapeHtml(status || 'NONE')}
            </span>
        `;
    }

    function countEvalRunsByStatus(runs, status) {
        return (Array.isArray(runs) ? runs : [])
            .filter(run => String(run.status || '').toUpperCase() === status)
            .length;
    }

    function renderEvalRunSummary(runs) {
        const total = Array.isArray(runs) ? runs.length : 0;
        const passed = countEvalRunsByStatus(runs, 'PASSED');
        const partial = countEvalRunsByStatus(runs, 'PARTIAL');
        const failed = countEvalRunsByStatus(runs, 'FAILED');
        return `
            <div class="mb-3 grid gap-2 sm:grid-cols-2 xl:grid-cols-4">
                ${renderCompactMetric('记录', total, total > 0 ? 'blue' : 'gray')}
                ${renderCompactMetric('通过', passed, passed > 0 ? 'green' : 'gray')}
                ${renderCompactMetric('部分', partial, partial > 0 ? 'amber' : 'gray')}
                ${renderCompactMetric('失败', failed, failed > 0 ? 'red' : 'green')}
            </div>

    }

    async function requestEval(url, options = {}) {
        const fetchOptions = {
            method: options.method || 'GET',
            headers: { 'Content-Type': 'application/json' }
        };
        if (options.body) {
            fetchOptions.body = JSON.stringify(options.body);
        }
        const res = await fetch(url, fetchOptions);
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
            throw new Error(data.error || data.message || `Eval request failed (HTTP ${res.status})`);
        }
        return data;
    }

    async function loadEvalData() {
        const projectId = document.getElementById('evalProjectId').value.trim();
        const suffix = projectId ? `?projectId=${encodeURIComponent(projectId)}` : '';
        try {

                requestEval(`/api/agent/eval/runs${suffix}`),
                requestEval(`/api/agent/eval/report${suffix}`)
            ]);
            renderEvalRuns(runs);
            renderEvalReport(report);

            document.getElementById('evalRunList').innerHTML = `<p class="text-sm text-red-600">${renderProjectIntakeValue(e.message, '评测记录加载失败')}</p>`;

        }
    }

    }

    function setCodeContextLoading(isLoading) {
        codeContextBusy = isLoading;
        const button = document.getElementById('codeContextButton');
        button.disabled = isLoading;
        button.innerHTML = isLoading
            ? '<i class="fa-solid fa-spinner fa-spin mr-1.5"></i> 运行中'
            : '<i class="fa-solid fa-play mr-1.5"></i> 运行';
    }

    function buildCodeContextRequest(mode, rootPath, query) {
        if (mode === 'tree') {
            return { endpoint: '/api/agent/code/tree', body: { rootPath, maxFiles: 500, maxDepth: 8 } };
        }
        if (mode === 'diff') {
            return { endpoint: '/api/agent/code/diff', body: { rootPath, query, maxLines: 200 } };
        }
        if (mode === 'chunks') {
            return {
                endpoint: '/api/agent/code/chunks',
                body: { rootPath, maxChunks: 100, maxFileBytes: 1048576, maxChunkChars: 2000 }
            };
        }
        if (mode === 'semantic') {
            return {
                endpoint: '/api/agent/code/semantic',
                body: { rootPath, query, maxResults: 20, maxFileBytes: 1048576, maxChunkChars: 2000 }
            };
        }
        return {
            endpoint: '/api/agent/code/search',
            body: { rootPath, query, maxResults: 100, maxFileBytes: 1048576 }
        };
    }

    function renderCodeContextItems(items, renderer, emptyText = 'No results') {
        if (!Array.isArray(items) || items.length === 0) {
            return `<p class="text-gray-400">${escapeHtml(emptyText)}</p>`;
        }
        return `<div class="space-y-2">${items.map(renderer).join('')}</div>`;
    }

    function renderCodeContextResult(mode, data) {
        const result = document.getElementById('codeContextResult');
        const meta = document.getElementById('codeContextMeta');
        const warnings = Array.isArray(data.warnings) ? data.warnings : [];
        const skipped = Array.isArray(data.skippedFiles) ? data.skippedFiles : [];
        const resultItems = mode === 'tree'
            ? (Array.isArray(data.files) ? data.files : [])
            : mode === 'diff'
                ? (Array.isArray(data.files) ? data.files : [])
                : mode === 'chunks'
                    ? (Array.isArray(data.chunks) ? data.chunks : [])
                    : (Array.isArray(data.matches) ? data.matches : []);
        const summaryHtml = `
            <div class="mb-3 grid gap-2 sm:grid-cols-2 xl:grid-cols-4">
                ${renderCompactMetric('结果', resultItems.length, resultItems.length > 0 ? 'blue' : 'gray')}
                ${renderCompactMetric('跳过', skipped.length, skipped.length > 0 ? 'amber' : 'green')}
                ${renderCompactMetric('警告', warnings.length, warnings.length > 0 ? 'red' : 'green')}
                ${renderCompactMetric('Git', data.gitRepository === true ? 'yes' : data.gitRepository === false ? 'no' : 'n/a', data.gitRepository === true ? 'green' : 'gray')}
            </div>
        `;

        result.classList.remove('hidden');
        meta.classList.remove('hidden');

        if (mode === 'tree') {
            result.innerHTML = summaryHtml + renderCodeContextItems(resultItems, file => `
                <div class="rounded-md border border-gray-200 bg-white p-2">
                    <p class="break-all font-medium text-gray-700">${renderText(file.path)}</p>
                    <p class="mt-1 text-xs text-gray-500">${Number(file.bytes || 0)} bytes · ${renderText(file.extension || 'file')}</p>
                </div>
            `);
        } else if (mode === 'diff') {
            result.innerHTML = summaryHtml + renderCodeContextItems(resultItems, file => `
                <div class="rounded-md border border-gray-200 bg-white p-2">
                    <p class="break-all font-medium text-gray-700">${renderText(file.path)}</p>
                    <div class="mt-2 max-h-64 overflow-auto rounded bg-gray-900 p-2 font-mono text-xs text-gray-100">
                        ${(file.lines || []).map(line => `
                            <div>
                                <span class="${line.type === 'add' ? 'text-green-300' : line.type === 'delete' ? 'text-red-300' : 'text-gray-400'}">
                                    ${escapeHtml(line.type)}
                                </span>
                                <span class="text-gray-500">${escapeHtml(line.oldLineNumber ?? '')}:${escapeHtml(line.newLineNumber ?? '')}</span>
                                ${renderText(line.content)}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `);
        } else if (mode === 'chunks') {
            result.innerHTML = summaryHtml + renderCodeContextItems(resultItems, chunk => `
                <div class="rounded-md border border-gray-200 bg-white p-2">
                    <p class="break-all font-medium text-gray-700">${renderText(chunk.path)}:${escapeHtml(chunk.startLine)}-${escapeHtml(chunk.endLine)}</p>
                    <pre class="mt-2 max-h-48 overflow-auto rounded bg-gray-900 p-2 text-xs text-gray-100">${escapeHtml(chunk.content)}</pre>
                </div>
            `);
        } else if (mode === 'semantic') {
            result.innerHTML = summaryHtml + renderCodeContextItems(resultItems, match => `
                <div class="rounded-md border border-gray-200 bg-white p-2">
                    <div class="flex flex-wrap items-center justify-between gap-2">
                        <p class="break-all font-medium text-gray-700">${renderText(match.path)}:${escapeHtml(match.startLine)}-${escapeHtml(match.endLine)}</p>
                        <span class="rounded-full border border-blue-200 bg-blue-50 px-2 py-0.5 text-xs font-medium text-blue-700">
                            score ${escapeHtml(match.score)}
                        </span>
                    </div>
                    <p class="mt-1 text-xs text-gray-500">${renderText((match.matchedTerms || []).join(', '))}</p>
                    <pre class="mt-2 max-h-48 overflow-auto rounded bg-gray-900 p-2 text-xs text-gray-100">${escapeHtml(match.content)}</pre>
                </div>
            `);
        } else {
            result.innerHTML = summaryHtml + renderCodeContextItems(resultItems, match => `
                <div class="rounded-md border border-gray-200 bg-white p-2">
                    <p class="break-all font-medium text-gray-700">${renderText(match.path)}:${escapeHtml(match.lineNumber)}</p>
                    <pre class="mt-2 overflow-auto rounded bg-gray-900 p-2 text-xs text-gray-100">${escapeHtml(match.line)}</pre>
                </div>
            `);
        }

        meta.innerHTML = `
            <div class="space-y-4">
                <section>
                    <h3 class="mb-2 text-xs font-semibold uppercase text-gray-500">Request</h3>
                    <div class="rounded-md border border-gray-200 bg-white p-2 text-xs text-gray-600">
                        <p>mode: ${escapeHtml(mode)}</p>
                        <p class="break-all">root: ${renderText(data.rootPath || '')}</p>
                        ${data.query ? `<p>query: ${renderText(data.query)}</p>` : ''}
                        ${typeof data.gitRepository === 'boolean' ? `<p>git: ${escapeHtml(data.gitRepository)}</p>` : ''}
                    </div>
                </section>
                <section>
                    <h3 class="mb-2 text-xs font-semibold uppercase text-gray-500">Skipped</h3>
                    ${renderCodeContextItems(skipped, file => `
                        <div class="rounded-md border border-gray-200 bg-white p-2">
                            <p class="break-all text-xs text-gray-700">${renderText(file.path)}</p>
                            <p class="mt-1 text-xs text-gray-500">${renderText(file.reason)}</p>
                        </div>
                    `, 'No skipped files')}
                </section>
                <section>
                    <h3 class="mb-2 text-xs font-semibold uppercase text-gray-500">Warnings</h3>
                    ${renderCodeContextItems(warnings, warning => `
                        <p class="rounded-md border border-yellow-200 bg-yellow-50 p-2 text-xs text-yellow-800">${renderText(warning)}</p>
                    `, 'No warnings')}
                </section>
            </div>
        `;
    }

    async function runCodeContext() {
        if (codeContextBusy) return;

        const rootPath = document.getElementById('codeContextPath').value.trim();
        const query = document.getElementById('codeContextQuery').value.trim();
        const mode = document.getElementById('codeContextMode').value;
        const result = document.getElementById('codeContextResult');
        const meta = document.getElementById('codeContextMeta');

        if (!rootPath) {
            result.classList.remove('hidden');
            result.innerHTML = '<p class="text-sm text-red-600">请先输入项目路径。</p>';
            document.getElementById('codeContextPath').focus();
            return;
        }
        if ((mode === 'search' || mode === 'diff' || mode === 'semantic') && !query) {
            result.classList.remove('hidden');
            result.innerHTML = '<p class="text-sm text-red-600">Query is required for this mode.</p>';
            document.getElementById('codeContextQuery').focus();
            return;
        }

        const request = buildCodeContextRequest(mode, rootPath, query);
        setCodeContextLoading(true);
        result.classList.remove('hidden');
        meta.classList.add('hidden');
        result.innerHTML = `
            <div class="flex items-center gap-2 text-sm text-gray-600">
                <i class="fa-solid fa-spinner fa-spin text-blue-600"></i>
                正在读取代码上下文...
            </div>
        `;

        try {
            const res = await fetch(request.endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request.body)
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok || data.success === false) {
                throw new Error(data.error || data.message || `代码上下文请求失败（HTTP ${res.status}）`);
            }
            renderCodeContextResult(mode, data);
        } catch (e) {
            result.innerHTML = `<p class="text-sm text-red-600">${renderProjectIntakeValue(e.message, '代码上下文请求失败')}</p>`;
        } finally {
            setCodeContextLoading(false);
        }
    }

    function formatDurationMs(value) {
        const duration = Number(value);
        if (!Number.isFinite(duration)) {
            return '';
        }
        return `${Math.max(0, Math.round(duration))} ms`;
    }

    function getMetricsDetailParts(metrics) {
        if (!metrics || typeof metrics !== 'object') {
            return [];
        }

        return [
            ['totalMs', '总耗时'],
            ['rewriteMs', '改写'],
            ['retrievalMs', '召回'],
            ['filterMs', '过滤'],
            ['rerankMs', '重排'],
            ['generationMs', '生成']
        ].reduce((parts, [key, label]) => {
            const formatted = formatDurationMs(metrics[key]);
            if (formatted && (key === 'totalMs' || Number(metrics[key]) > 0)) {
                parts.push(`${label} ${formatted}`);
            }
            return parts;
        }, []);
    }

    function getStageDetailText(stage) {
        const details = stage.details || {};
        const parts = [];
        if (details.metadataFilter && details.metadataFilter.fileName) {
            parts.push(`文档：${details.metadataFilter.fileName}`);
        }
        if (details.rewrittenQuery) {
            parts.push(`改写：${details.rewrittenQuery}`);
        }
        if (Number.isFinite(Number(details.candidateCount))) {
            parts.push(`候选 ${Number(details.candidateCount)} 个`);
        }
        if (Number.isFinite(Number(details.retrievedCount))) {
            parts.push(`命中 ${Number(details.retrievedCount)} 个`);
        }
        if (Number.isFinite(Number(details.referenceCount))) {
            parts.push(`引用 ${Number(details.referenceCount)} 个`);
        }
        const durationText = formatDurationMs(details.durationMs);
        if (durationText) {
            parts.push(`耗时 ${durationText}`);
        }
        const totalText = formatDurationMs(details.totalMs);
        if (totalText) {
            parts.push(`总耗时 ${totalText}`);
        }
        return parts.join(' · ');
    }
