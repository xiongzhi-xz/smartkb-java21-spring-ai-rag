    function clampDocumentDetailWidth(width) {
        const viewportMax = Math.max(documentDetailMinWidth, Math.min(documentDetailMaxWidth, window.innerWidth - 32));
        return Math.max(documentDetailMinWidth, Math.min(width, viewportMax));
    }

    function setDocumentDetailWidth(width) {
        const panel = document.getElementById('documentDetailPanel');
        const nextWidth = clampDocumentDetailWidth(width);
        panel.style.width = `${nextWidth}px`;
        panel.style.maxWidth = `calc(100vw - 32px)`;
        localStorage.setItem(documentDetailWidthKey, String(nextWidth));
    }

    function initDocumentDetailWidth() {
        const savedWidth = Number(localStorage.getItem(documentDetailWidthKey));
        setDocumentDetailWidth(Number.isFinite(savedWidth) && savedWidth > 0 ? savedWidth : 720);
    }

    function initDocumentDetailResize() {
        const handle = document.getElementById('documentDetailResizeHandle');
        let resizing = false;

        handle.addEventListener('mousedown', function(e) {
            resizing = true;
            document.body.classList.add('select-none');
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!resizing) return;
            setDocumentDetailWidth(window.innerWidth - e.clientX);
        });

        document.addEventListener('mouseup', function() {
            if (!resizing) return;
            resizing = false;
            document.body.classList.remove('select-none');
        });

        window.addEventListener('resize', function() {
            const panel = document.getElementById('documentDetailPanel');
            setDocumentDetailWidth(panel.getBoundingClientRect().width);
        });
    }

    function buildMessageHtml(content, isUser, sources = [], details = {}, loading = false) {
        const hasStageProgress = !isUser && Array.isArray(details.stages) && details.stages.length > 0;
        let html = `
            <div class="${isUser ? 'user-msg' : 'ai-msg'} px-5 py-3.5 rounded-3xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'}">
        `;

        if (loading && !hasStageProgress) {
            html += `
                <div class="flex items-center gap-2 text-sm text-gray-500">
                    <i class="fa-solid fa-spinner fa-spin text-blue-600"></i>
                    <span>${escapeHtml(content)}</span>
                </div>
            `;
        } else if (!loading) {
            html += `<div class="text-sm">${renderText(content)}</div>`;
        }

        if (!isUser) {
            const detailParts = [];
            if (Number.isFinite(Number(details.retrievedCount))) {
                detailParts.push(`${Number(details.retrievedCount)} 个片段`);
            }
            if (details.rewrittenQuery) {
                detailParts.push(`改写：${escapeHtml(details.rewrittenQuery)}`);
            }
            detailParts.push(...getMetricsDetailParts(details.metrics).map(escapeHtml));
            if (detailParts.length > 0) {
                html += `<div class="mt-2 text-xs text-gray-400">${detailParts.join(' · ')}</div>`;
            }
        }

        if (hasStageProgress) {
            html += `
                <div class="${loading ? 'mt-0' : 'mt-3'} space-y-2 rounded-lg border border-gray-200 bg-white/70 p-3 text-xs text-gray-600">
                    ${details.stages.map((stage, index) => {
                        const isActive = loading && index === details.stages.length - 1;
                        const icon = isActive
                            ? '<i class="fa-solid fa-spinner fa-spin text-blue-600"></i>'
                            : '<i class="fa-solid fa-check text-green-600"></i>';
                        const detailText = getStageDetailText(stage);
                        return `
                            <div class="flex items-start gap-2">
                                <span class="mt-0.5 w-4 shrink-0">${icon}</span>
                                <div class="min-w-0">
                                    <div class="${isActive ? 'text-blue-700 font-medium' : 'text-gray-700'}">${escapeHtml(stage.message || '处理中')}</div>
                                    ${detailText ? `<div class="mt-0.5 text-gray-400 break-words">${escapeHtml(detailText)}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }
        
        if (!isUser && sources.length > 0) {
            html += `<div class="mt-3 text-xs text-gray-500">参考来源：${sources.map(escapeHtml).join('、')}</div>`;
        }

        if (!isUser && Array.isArray(details.references) && details.references.length > 0) {
            html += `
                <details class="mt-3 border-t border-gray-200 pt-3 text-xs text-gray-600">
                    <summary class="cursor-pointer select-none text-blue-600 hover:text-blue-700">
                        查看引用片段（${details.references.length}）
                    </summary>
                    <div class="mt-3 space-y-3">
                        ${details.references.map((reference, index) => `
                            <button
                                type="button"
                                class="w-full rounded-lg border border-gray-200 bg-white p-3 text-left transition hover:border-blue-300 hover:bg-blue-50 focus:outline-none focus:ring-2 focus:ring-blue-200"
                                title="打开文档并定位该片段"
                                data-reference-file-name="${escapeHtml(reference.fileName || '')}"
                                data-reference-chunk-id="${escapeHtml(reference.chunkId || '')}"
                            >
                                <div class="flex items-center justify-between gap-3 text-gray-500">
                                    <span class="font-medium text-gray-700">片段 ${index + 1}</span>
                                    <span class="truncate">${escapeHtml(reference.fileName || '未知文档')} · ${escapeHtml(reference.chunkId || '')}</span>
                                </div>
                                <div class="mt-2 leading-6 text-gray-700">${renderText(reference.preview || '')}</div>
                            </button>
                        `).join('')}
                    </div>
                </details>
            `;
        }
        
        html += `</div>`;
        return html;
    }

    function addMessage(content, isUser, sources = [], details = {}, loading = false) {
        const container = document.getElementById('chatContainer');
        const msgDiv = document.createElement('div');
        msgDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} message`;
        msgDiv.innerHTML = buildMessageHtml(content, isUser, sources, details, loading);
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        return msgDiv;
    }

    function updateAssistantMessage(msgDiv, content, sources = [], details = {}, loading = false) {
        msgDiv.innerHTML = buildMessageHtml(content, false, sources, details, loading);
        const container = document.getElementById('chatContainer');
        container.scrollTop = container.scrollHeight;
    }

    function getPendingMessageText() {
        return ragMode === 'advanced'
            ? '正在改写查询、检索文档并生成回答...'
            : '正在结合会话上下文检索并生成回答...';
    }

    function setChatBusy(isBusy) {
        chatBusy = isBusy;
        const input = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');

        input.disabled = isBusy;
        sendButton.disabled = isBusy;
        sendButton.classList.toggle('opacity-70', isBusy);
        sendButton.classList.toggle('cursor-not-allowed', isBusy);
        sendButton.innerHTML = isBusy
            ? '<i class="fa-solid fa-spinner fa-spin mr-2"></i>发送中'
            : '发送';
    }

    function parseSseBlock(block) {
        const event = { type: 'message', data: '' };
        const dataLines = [];

        block.split(/\r?\n/).forEach(line => {
            if (line.startsWith('event:')) {
                event.type = line.slice('event:'.length).trim();
            } else if (line.startsWith('data:')) {
                dataLines.push(line.slice('data:'.length).trimStart());
            }
        });

        event.data = dataLines.join('\n');
        return event;
    }

    async function streamConversationMessage(payload, pendingMessage) {
        const res = await fetch('/api/chat/conversation/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!res.ok || !res.body) {
            throw new Error('流式问答请求失败');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let answer = '';
        let nextConversationId = payload.conversationId || null;

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            let boundaryIndex;
            while ((boundaryIndex = buffer.indexOf('\n\n')) >= 0) {
                const block = buffer.slice(0, boundaryIndex).trim();
                buffer = buffer.slice(boundaryIndex + 2);
                if (!block) continue;

                const event = parseSseBlock(block);
                const data = event.data ? JSON.parse(event.data) : {};

                if (event.type === 'conversation') {
                    nextConversationId = data.conversationId || nextConversationId;
                    conversationId = nextConversationId;
                    localStorage.setItem(conversationIdKey, conversationId);
                    updateConversationStatus();
                    continue;
                }

                if (event.type === 'token') {
                    answer += data.content || '';
                    updateAssistantMessage(pendingMessage, answer || '正在生成回答...');
                    continue;
                }

                if (event.type === 'error') {
                    throw new Error(data.error || '流式问答失败');
                }
            }
        }

        if (buffer.trim()) {
            const event = parseSseBlock(buffer.trim());
            if (event.data) {
                const data = JSON.parse(event.data);
                if (event.type === 'token') {
                    answer += data.content || '';
                }
            }
        }

        return {
            answer: answer || '未生成回答',
            conversationId: nextConversationId
        };
    }

    async function streamAdvancedMessage(payload, pendingMessage) {
        let nextConversationId = payload.conversationId || null;

        const res = await fetch('/api/chat/advanced/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!res.ok || !res.body) {
            throw new Error('Advanced RAG 分阶段请求失败');
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder('utf-8');
        let buffer = '';
        let answer = '';
        let sources = [];
        let references = [];
        let rewrittenQuery = '';
        let retrievedCount;
        let metrics = null;
        const stages = [];

        function renderStage(message) {
            updateAssistantMessage(pendingMessage, message || '正在处理...', [], {
                stages,
                rewrittenQuery,
                retrievedCount
            }, true);
        }

        function handleAdvancedEvent(event) {
            const data = event.data ? JSON.parse(event.data) : {};

            if (event.type === 'conversation') {
                // 保存后端返回的 conversationId
                nextConversationId = data.conversationId || nextConversationId;
                conversationId = nextConversationId;
                localStorage.setItem(conversationIdKey, conversationId);
                updateConversationStatus();
                return false;
            }

            if (event.type === 'stage') {
                const stage = {
                    stage: data.stage,
                    message: data.message,
                    details: data.details || {}
                };
                stages.push(stage);
                if (stage.details.rewrittenQuery) {
                    rewrittenQuery = stage.details.rewrittenQuery;
                }
                if (Number.isFinite(Number(stage.details.retrievedCount))) {
                    retrievedCount = Number(stage.details.retrievedCount);
                }
                renderStage(stage.message);
                return false;
            }

            if (event.type === 'done') {
                answer = data.answer || data.content || '未生成回答';
                sources = data.sources || [];
                references = data.references || [];
                rewrittenQuery = data.rewrittenQuery || rewrittenQuery;
                retrievedCount = data.retrievedCount;
                metrics = data.metrics || null;
                updateAssistantMessage(pendingMessage, answer, sources, {
                    retrievedCount,
                    rewrittenQuery,
                    metrics,
                    references,
                    stages
                });
                return true;
            }

            if (event.type === 'error') {
                throw new Error(data.error || 'Advanced RAG 分阶段请求失败');
            }

            return false;
        }

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            let boundaryIndex;
            while ((boundaryIndex = buffer.indexOf('\n\n')) >= 0) {
                const block = buffer.slice(0, boundaryIndex).trim();
                buffer = buffer.slice(boundaryIndex + 2);
                if (!block) continue;

                handleAdvancedEvent(parseSseBlock(block));
            }
        }

        if (buffer.trim()) {
            handleAdvancedEvent(parseSseBlock(buffer.trim()));
        }

        return {
            answer: answer || '未生成回答',
            conversationId: nextConversationId
        };
    }

    async function sendMessage() {
        if (chatBusy) return;

        const input = document.getElementById('userInput');
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, true);
        input.value = '';
        const pendingMessage = addMessage(getPendingMessageText(), false, [], {}, true);
        setChatBusy(true);

        try {
            const payload = ragMode === 'advanced'
                ? { question: question, conversationId: conversationId }
                : { question: question, conversationId: conversationId };

            if (ragMode === 'advanced' && advancedFilterFileName) {
                payload.metadataFilter = { fileName: advancedFilterFileName };
            }

            let answer;
            if (ragMode === 'conversation') {
                const streamResult = await streamConversationMessage(payload, pendingMessage);
                answer = streamResult.answer;
            } else {
                const streamResult = await streamAdvancedMessage(payload, pendingMessage);
                answer = streamResult.answer;
            }

            chatHistory.push({ role: 'user', content: question });
            chatHistory.push({ role: 'assistant', content: answer });
        } catch (e) {
            let errorMsg = e.message || '未知错误';
            // AI 模型相关错误给出更友好的提示
            if (errorMsg.includes('AI_MODEL_ERROR') || errorMsg.includes('AI 模型')
                    || errorMsg.includes('api key') || errorMsg.includes('API Key')
                    || errorMsg.includes('认证失败') || errorMsg.includes('模型不存在')
                    || errorMsg.includes('额度不足') || errorMsg.includes('限流')
                    || errorMsg.includes('无法连接') || errorMsg.includes('模型服务')
                    || errorMsg.includes('503') || errorMsg.includes('401')) {
                updateAssistantMessage(pendingMessage, '⚠ ' + errorMsg);
            } else {
                updateAssistantMessage(pendingMessage, `请求失败：${errorMsg}`);
            }
        } finally {
            setChatBusy(false);
            input.focus();
        }
    }

    function uploadDocument() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // 显示上传进度提示
        const docList = document.getElementById('documentList');
        const uploadingDiv = document.createElement('div');
        uploadingDiv.id = 'uploading-indicator';
        uploadingDiv.className = 'p-3 bg-blue-50 border border-blue-200 rounded-lg';
        uploadingDiv.innerHTML = `
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-spinner fa-spin text-blue-600"></i>
                <div class="flex-1">
                    <div class="font-medium text-blue-900 text-sm">${escapeHtml(file.name)}</div>
                    <div class="text-xs text-blue-600 mt-1">正在上传并生成向量...</div>
                </div>
            </div>
        `;
        docList.prepend(uploadingDiv);

        const formData = new FormData();
        formData.append('file', file);

        try {
            const res = await fetch('/api/documents/upload', {
                method: 'POST',
                body: formData
            });
            const result = await res.json();
            if (!res.ok || result.success === false) {
                throw new Error(result.error || '上传失败');
            }

            // 移除上传提示
            uploadingDiv.remove();

            // 添加成功提示
            const successDiv = document.createElement('div');
            successDiv.className = 'p-3 bg-green-50 border border-green-200 rounded-lg';
            successDiv.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-check-circle text-green-600"></i>
                    <div class="flex-1">
                        <div class="font-medium text-green-900 text-sm">${escapeHtml(file.name)}</div>
                        <div class="text-xs text-green-600 mt-1">上传成功，已生成 ${escapeHtml(result.chunkCount || '?')} 个向量块</div>
                    </div>
                </div>
            `;
            docList.prepend(successDiv);

            // 3秒后移除成功提示，加载文档列表
            setTimeout(() => {
                successDiv.remove();
                loadDocuments();
            }, 3000);

        } catch (err) {
            // 移除上传提示
            uploadingDiv.remove();

            // 显示错误
            const errorDiv = document.createElement('div');
            errorDiv.className = 'p-3 bg-red-50 border border-red-200 rounded-lg';
            errorDiv.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-exclamation-circle text-red-600"></i>
                    <div class="flex-1">
                        <div class="font-medium text-red-900 text-sm">上传失败</div>
                        <div class="text-xs text-red-600 mt-1">${escapeHtml(err.message)}</div>
                    </div>
                </div>
            `;
            docList.prepend(errorDiv);

            setTimeout(() => errorDiv.remove(), 5000);
        }

        // 重置文件输入
        e.target.value = '';
    });

    function clearChat() {
        if (confirm('确定要开始一个新会话吗？')) {
            // 通知后端清除 ChatMemory（Redis 中对应的会话数据）
            if (conversationId) {
                fetch('/api/chat/memory/' + conversationId, { method: 'DELETE' })
                    .catch(() => {});  // 清除失败不阻塞前端操作
            }

            document.getElementById('chatContainer').innerHTML = '';
            chatHistory = [];
            conversationId = null;
            localStorage.removeItem(conversationIdKey);
            updateConversationStatus();
        }
    }

    function openDocumentDetail() {
        initDocumentDetailWidth();
        document.getElementById('documentDetailOverlay').classList.remove('hidden');
    }

    function closeDocumentDetail() {
        document.getElementById('documentDetailOverlay').classList.add('hidden');
        selectedDocumentFileName = null;
        highlightSelectedDocument();
    }

    async function showDocumentDetail(fileName, targetChunkId = '') {
        selectedDocumentFileName = fileName;
        highlightSelectedDocument();
        openDocumentDetail();

        const title = document.getElementById('documentDetailTitle');
        const meta = document.getElementById('documentDetailMeta');
        const body = document.getElementById('documentDetailBody');

        title.textContent = fileName;
        meta.textContent = '加载中...';
        body.innerHTML = `
            <div class="h-full flex items-center justify-center text-sm text-gray-500">
                <i class="fa-solid fa-spinner fa-spin mr-2 text-blue-600"></i>
                正在加载文档片段
            </div>
        `;

        try {
            const res = await fetch(`/api/documents/${encodeURIComponent(fileName)}`);
            const data = await res.json();
            if (!res.ok || data.success === false) {
                throw new Error(data.error || '加载文档详情失败');
            }

            renderDocumentDetail(data.document || { fileName, chunks: [] }, targetChunkId);
        } catch (err) {
            meta.textContent = '加载失败';
            body.innerHTML = `
                <div class="p-4 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
                    ${escapeHtml(err.message)}
                </div>
            `;
        }
    }

    async function deleteDocument(fileName, triggerButton) {
        const confirmed = window.confirm(`确定删除“${fileName}”吗？删除后需要重新上传才能恢复。`);
        if (!confirmed) {
            return;
        }

        const originalHtml = triggerButton.innerHTML;
        triggerButton.disabled = true;
        triggerButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        try {
            const res = await fetch(`/api/documents/${encodeURIComponent(fileName)}`, {
                method: 'DELETE'
            });
            const data = await res.json();
            if (!res.ok || data.success === false) {
                throw new Error(data.error || '删除文档失败');
            }

            if (selectedDocumentFileName === fileName) {
                closeDocumentDetail();
            }
            if (advancedFilterFileName === fileName) {
                setAdvancedFilter('');
            }

            loadDocuments();
        } catch (err) {
            triggerButton.disabled = false;
            triggerButton.innerHTML = originalHtml;
            alert(err.message);
        }
    }

    function renderDocumentDetail(documentDetail, targetChunkId = '') {
        const title = document.getElementById('documentDetailTitle');
        const meta = document.getElementById('documentDetailMeta');
        const body = document.getElementById('documentDetailBody');
        const chunks = documentDetail.chunks || [];
        const normalizedTargetChunkId = normalizeChunkId(targetChunkId);
        const hasTargetChunk = normalizedTargetChunkId
            ? chunks.some(chunk => normalizeChunkId(chunk.id) === normalizedTargetChunkId)
            : false;

        title.textContent = documentDetail.fileName || selectedDocumentFileName || '文档详情';
        meta.textContent = `${chunks.length} 个片段${hasTargetChunk ? ' · 已定位引用片段' : ''}${normalizedTargetChunkId && !hasTargetChunk ? ' · 未找到目标片段' : ''}`;

        if (chunks.length === 0) {
            body.innerHTML = '<div class="text-center text-sm text-gray-400 py-12">暂无可查看的文档片段</div>';
            return;
        }

        body.innerHTML = chunks.map((chunk, index) => {
            const chunkId = normalizeChunkId(chunk.id);
            const isTarget = chunkId && chunkId === normalizedTargetChunkId;
            const cardClass = isTarget
                ? 'bg-blue-50 border border-blue-300 ring-2 ring-blue-200'
                : 'bg-white border border-gray-200';
            return `
            <div id="${escapeHtml(getChunkElementId(chunkId))}" class="${cardClass} rounded-lg overflow-hidden scroll-mt-6" data-document-chunk-id="${escapeHtml(chunkId)}">
                <div class="px-4 py-3 border-b bg-gray-50 flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-700">片段 ${index + 1}</span>
                    <span class="text-xs text-gray-400">${escapeHtml(chunkId)}</span>
                </div>
                <div class="p-4 text-sm text-gray-700 leading-7 whitespace-pre-wrap break-words">${escapeHtml(chunk.content || '')}</div>
            </div>
        `;
        }).join('');

        if (hasTargetChunk) {
            requestAnimationFrame(() => {
                const target = document.getElementById(getChunkElementId(normalizedTargetChunkId));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }
    }

    function initReferenceNavigation() {
        const chatContainer = document.getElementById('chatContainer');
        chatContainer.addEventListener('click', function(e) {
            const trigger = e.target.closest('[data-reference-file-name][data-reference-chunk-id]');
            if (!trigger || !chatContainer.contains(trigger)) {
                return;
            }

            const fileName = trigger.dataset.referenceFileName;
            const chunkId = trigger.dataset.referenceChunkId;
            if (!fileName) {
                return;
            }

            showDocumentDetail(fileName, chunkId);
        });
    }

    document.getElementById('documentDetailOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeDocumentDetail();
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeDocumentDetail();
        }
    });

    function loadDocuments() {
        // 从向量数据库加载文档列表
        fetch('/api/documents')
            .then(async res => {
                const data = await res.json();
                if (!res.ok || data.success === false) {
                    throw new Error(data.error || '加载文档列表失败');
                }
                return data;
            })
            .then(data => {
                const docList = document.getElementById('documentList');
                docList.innerHTML = '';

                const docs = data.documents || [];
                uploadedDocuments = docs;
                renderAdvancedDocumentFilter();

                if (docs.length === 0) {
                    docList.innerHTML = '<div class="text-gray-400 text-sm text-center py-4">暂无文档</div>';
                    return;
                }

                docs.forEach(doc => {
                    const fileName = doc.fileName || doc.name || '未知文档';
                    const docDiv = document.createElement('div');
                    docDiv.role = 'button';
                    docDiv.tabIndex = 0;
                    docDiv.dataset.documentFileName = fileName;
                    docDiv.className = getDocumentItemClass(fileName === selectedDocumentFileName);
                    docDiv.addEventListener('click', () => showDocumentDetail(fileName));
                    docDiv.addEventListener('keydown', e => {
                        if (e.target !== docDiv) {
                            return;
                        }
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            showDocumentDetail(fileName);
                        }
                    });
                    docDiv.innerHTML = `
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex-1 min-w-0">
                                <div class="font-medium text-sm text-gray-900 truncate">${escapeHtml(fileName)}</div>
                                <div class="text-xs text-gray-500 mt-1">${escapeHtml(doc.chunkCount || doc.chunks || 0)} 个片段</div>
                            </div>
                            <i class="fa-solid fa-file-alt text-gray-300 group-hover:text-blue-500"></i>
                            <button
                                type="button"
                                class="document-delete-button flex h-8 w-8 shrink-0 items-center justify-center rounded-md text-gray-300 transition hover:bg-red-50 hover:text-red-600 disabled:cursor-not-allowed disabled:opacity-60"
                                title="删除文档"
                                aria-label="删除 ${escapeHtml(fileName)}"
                            >
                                <i class="fa-solid fa-trash-can text-sm"></i>
                            </button>
                        </div>
                    `;
                    const deleteButton = docDiv.querySelector('.document-delete-button');
                    deleteButton.addEventListener('click', e => {
                        e.stopPropagation();
                        deleteDocument(fileName, deleteButton);
                    });
                    docList.appendChild(docDiv);
                });
            })
            .catch(err => {
                console.error('加载文档列表失败:', err);
                uploadedDocuments = [];
                renderAdvancedDocumentFilter();
                const docList = document.getElementById('documentList');
                docList.innerHTML = '<div class="text-red-400 text-sm text-center py-4">加载失败</div>';
            });
    }

    // 页面加载时自动加载文档列表
    window.onload = function() {
        const welcome = `
            <div class="text-center text-gray-400 py-8">
                <i class="fa-solid fa-brain text-6xl mb-4 text-blue-200"></i>
                <p class="text-lg font-medium text-gray-600">欢迎使用 SmartKB 企业智能知识库</p>
                <p class="text-sm mt-2">请先上传文档，然后向我提问</p>
            </div>
        `;
        document.getElementById('chatContainer').innerHTML = welcome;
        renderAdvancedDocumentFilter();
        updateRagModeUI();
        initDocumentDetailResize();
        initDocumentDetailWidth();
        initReferenceNavigation();
        loadDocuments(); // 自动加载文档列表
    };
</script>
