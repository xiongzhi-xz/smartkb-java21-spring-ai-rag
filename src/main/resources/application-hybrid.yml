spring:
  application:
    name: smartkb

  # Java 21 Virtual Threads
  threads:
    virtual:
      enabled: true

  # 数据源配置 - PostgreSQL 16 + pgvector
  datasource:
    url: jdbc:postgresql://localhost:5432/smartkb
    username: smartkb
    password: smartkb123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Spring AI 配置 - 混合模式（Chat用中转站 + Embedding用本地）
  ai:
    # OpenAI 兼容接口 - 用于 Chat
    openai:
      api-key: ${TRANSIT_API_KEY:${OPENAI_API_KEY:your-api-key-here}}
      base-url: ${TRANSIT_BASE_URL:https://api.deepseek.com}
      chat:
        enabled: true
        options:
          model: ${AI_MODEL:deepseek-chat}
          temperature: 0.7
          max-tokens: 2000
      embedding:
        enabled: false  # 禁用 OpenAI Embedding

    # Ollama 本地模型 - 用于 Embedding
    ollama:
      base-url: http://localhost:11434
      embedding:
        enabled: true
        options:
          model: nomic-embed-text

    # pgvector 向量存储配置
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768  # nomic-embed-text 的维度
        remove-existing-vector-store-table: false
        initialize-schema: true

# 服务器配置
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain

# 可观测性
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.smartkb: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.ai.openai.api: TRACE  # 追踪 OpenAI API URL
    org.springframework.jdbc: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 应用自定义配置
smartkb:
  document:
    max-file-size: 50MB
    allowed-extensions: pdf,docx,txt,md
    parse-concurrency: 50

  embedding:
    batch-size: 100
    concurrent-requests: 30

  rag:
    top-k: 5
    similarity-threshold: 0.7
    context-window: 4000

  agent:
    max-iterations: 5
    timeout: 60s
