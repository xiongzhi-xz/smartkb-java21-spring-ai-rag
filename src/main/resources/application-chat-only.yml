spring:
  application:
    name: smartkb

  # Java 21 Virtual Threads
  threads:
    virtual:
      enabled: true

  # Spring AI 配置 - 仅 Chat（不使用 RAG）
  ai:
    openai:
      api-key: ${TRANSIT_API_KEY:${OPENAI_API_KEY:sk-your-api-key-here}}
      base-url: ${TRANSIT_BASE_URL:https://fufu.iqach.top/v1}
      chat:
        options:
          model: mimo-v2.5-pro
          temperature: 0.7
          max-tokens: 2000

# 服务器配置
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain

# 日志配置
logging:
  level:
    root: INFO
    com.smartkb: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
