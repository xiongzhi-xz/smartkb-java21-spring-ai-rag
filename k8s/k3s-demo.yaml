---
apiVersion: v1
kind: Namespace
metadata:
  name: smartkb

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: smartkb
data:
  init-db.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: smartkb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: smartkb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: smartkb
            - name: POSTGRES_USER
              value: smartkb
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartkb-secrets
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - smartkb
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d/init-db.sql
              subPath: init-db.sql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-init
          configMap:
            name: postgres-init

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: smartkb
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: smartkb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: smartkb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: smartkb
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartkb-app
  namespace: smartkb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smartkb-app
  template:
    metadata:
      labels:
        app: smartkb-app
    spec:
      containers:
        - name: smartkb
          image: smartkb:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-service:5432/smartkb
            - name: SPRING_DATASOURCE_USERNAME
              value: smartkb
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartkb-secrets
                  key: postgres-password
            - name: SPRING_DATA_REDIS_HOST
              value: redis-service
            - name: SPRING_DATA_REDIS_PORT
              value: "6379"
            - name: SMARTKB_AGENT_EVAL_RUN_PERSISTENCE
              value: jdbc
            - name: OLLAMA_BASE_URL
              value: http://host.k3d.internal:11434
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartkb-secrets
                  key: openai-api-key
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: smartkb-service
  namespace: smartkb
spec:
  type: ClusterIP
  selector:
    app: smartkb-app
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartkb-ingress
  namespace: smartkb
spec:
  ingressClassName: traefik
  rules:
    - host: smartkb.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: smartkb-service
                port:
                  number: 80
