# Draft Kubernetes manifest kept for historical design notes.
# Do not apply this file directly. The verified local K3d demo manifest is:
#   k8s/k3s-demo.yaml
# This draft still needs production decisions for registry tags, managed secrets,
# TLS/Ingress class, HA database shape, monitoring, and environment profiles.

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: smartkb

---
# ConfigMap - 应用配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartkb-config
  namespace: smartkb
data:
  application.yml: |
    spring:
      application:
        name: smartkb
      datasource:
        url: jdbc:postgresql://postgres-service:5432/smartkb
        username: smartkb
        password: ${POSTGRES_PASSWORD}
      data:
        redis:
          host: redis-service
          port: 6379
      threads:
        virtual:
          enabled: true
      ai:
        openai:
          api-key: ${OPENAI_API_KEY}

---
# Secret - 敏感信息
apiVersion: v1
kind: Secret
metadata:
  name: smartkb-secrets
  namespace: smartkb
type: Opaque
stringData:
  postgres-password: replace-at-deploy-time
  openai-api-key: replace-at-deploy-time

---
# PostgreSQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: smartkb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: pgvector/pgvector:pg16
        env:
        - name: POSTGRES_DB
          value: smartkb
        - name: POSTGRES_USER
          value: smartkb
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartkb-secrets
              key: postgres-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: smartkb
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# PostgreSQL PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: smartkb
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: smartkb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: smartkb
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# SmartKB Application Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartkb-app
  namespace: smartkb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartkb-app
  template:
    metadata:
      labels:
        app: smartkb-app
    spec:
      containers:
      - name: smartkb
        image: smartkb:latest  # 需要构建镜像
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smartkb-secrets
              key: postgres-password
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: smartkb-secrets
              key: openai-api-key
        - name: SPRING_PROFILES_ACTIVE
          value: prod
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

---
# SmartKB Service
apiVersion: v1
kind: Service
metadata:
  name: smartkb-service
  namespace: smartkb
spec:
  type: LoadBalancer
  selector:
    app: smartkb-app
  ports:
  - port: 80
    targetPort: 8080

---
# Ingress (可选)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartkb-ingress
  namespace: smartkb
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: smartkb.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: smartkb-service
            port:
              number: 80
