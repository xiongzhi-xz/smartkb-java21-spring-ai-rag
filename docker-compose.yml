version: '3.8'

services:
  # PostgreSQL 16 + pgvector 扩展
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartkb-postgres
    environment:
      POSTGRES_DB: smartkb
      POSTGRES_USER: smartkb
      POSTGRES_PASSWORD: smartkb123
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartkb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartkb-network

  # Redis - 会话记忆 + 缓存
  redis:
    image: redis:7-alpine
    container_name: smartkb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smartkb-network

  # Prometheus - 指标采集
  prometheus:
    image: prom/prometheus:latest
    container_name: smartkb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - smartkb-network

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: smartkb-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - smartkb-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  smartkb-network:
    driver: bridge
