version: '3.8'

services:
  # PostgreSQL 16 + pgvector 扩展
  postgres:
    image: pgvector/pgvector:pg16
    container_name: smartkb-postgres
    environment:
      POSTGRES_DB: smartkb
      POSTGRES_USER: smartkb
      POSTGRES_PASSWORD: smartkb123
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartkb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartkb-network

  # Redis - 会话记忆 + 缓存
  redis:
    image: redis:7-alpine
    container_name: smartkb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smartkb-network

  # SmartKB Spring Boot 应用
  smartkb-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartkb-app
    ports:
      - "8080:8080"
    environment:
      # 使用 Docker 网络内部 DNS 连接 PostgreSQL 和 Redis
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartkb
      SPRING_DATA_REDIS_HOST: redis
      # AI 模型配置（通过环境变量注入，不硬编码）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-api-key-here}
      TRANSIT_BASE_URL: ${TRANSIT_BASE_URL:-https://elysiver.h-e.top}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - smartkb-network

  # Prometheus - 指标采集
  prometheus:
    image: prom/prometheus:latest
    container_name: smartkb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - smartkb-app
    networks:
      - smartkb-network

  # Grafana - 可视化
  grafana:
    image: grafana/grafana:latest
    container_name: smartkb-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - smartkb-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  smartkb-network:
    driver: bridge
